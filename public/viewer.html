<meta name="generator" content="Perplexity Computer">
<meta name="author" content="Perplexity Computer">
<meta property="og:see_also" content="https://www.perplexity.ai/computer">
<link rel="author" href="https://www.perplexity.ai/computer">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChronoWeave — Timeline</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.js"></script>
<link rel="stylesheet" href="/css/themes.css">
<link rel="stylesheet" href="/css/base.css">
<link rel="stylesheet" href="/css/views.css">
<link rel="stylesheet" href="/css/modal.css">
<style>
  .hidden{display:none !important}
  body{overflow-x:hidden}

  /* -- Viewer layout -- */
  .viewer-wrap{max-width:100%;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column}

  /* Top bar */
  .viewer-topbar{
    display:flex;align-items:center;justify-content:space-between;
    padding:14px 24px;border-bottom:1px solid var(--border);
    background:var(--bg);position:sticky;top:0;z-index:50;
  }
  .viewer-brand{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--text)}
  .viewer-brand-name{font-size:15px;font-weight:600;letter-spacing:-0.02em}
  .viewer-topbar-right{display:flex;align-items:center;gap:8px}
  .viewer-topbar-link{
    padding:6px 12px;border-radius:var(--r-md);font-size:12px;font-weight:500;
    color:var(--text2);transition:all .15s;
  }
  .viewer-topbar-link:hover{color:var(--text);background:var(--surface)}

  /* Header section */
  .viewer-header{padding:24px 24px 0;max-width:1000px;margin:0 auto;width:100%}
  .viewer-title{font-size:24px;font-weight:700;margin-bottom:8px;letter-spacing:-.02em;line-height:1.3}
  .viewer-info{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
  .viewer-author{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text2)}
  .viewer-author-pic{width:22px;height:22px;border-radius:50%;object-fit:cover}
  .viewer-stats{display:flex;align-items:center;gap:12px;font-size:12px;color:var(--text3)}
  .viewer-stat{display:flex;align-items:center;gap:4px}
  .viewer-stat svg{width:14px;height:14px}

  /* Like button */
  .like-btn{
    display:flex;align-items:center;gap:6px;
    padding:6px 14px;border-radius:var(--r-full);
    font-size:12px;font-weight:500;color:var(--text2);
    background:var(--surface);border:1px solid var(--border);
    transition:all .2s var(--ease);
  }
  .like-btn:hover{border-color:var(--border2);background:var(--surface2);color:var(--text)}
  .like-btn.liked{color:#f87171;border-color:rgba(248,113,113,.3);background:rgba(248,113,113,.08)}
  .like-btn.liked:hover{background:rgba(248,113,113,.15)}
  .like-btn svg{width:14px;height:14px;transition:transform .2s}
  .like-btn.liked svg{fill:#f87171;color:#f87171}
  .like-btn:active svg{transform:scale(1.2)}

  /* Actions row */
  .viewer-actions{display:flex;align-items:center;gap:10px;margin-top:14px}

  /* View switcher - matches main app */
  .view-switcher{
    display:flex;align-items:center;gap:2px;
    background:var(--surface);border:1px solid var(--border);
    border-radius:var(--r-md);padding:2px;margin-left:auto;
  }
  .view-btn{
    padding:5px 12px;border-radius:var(--r-sm);font-size:12px;font-weight:500;
    color:var(--text3);transition:all .15s;display:flex;align-items:center;gap:5px;
  }
  .view-btn:hover{color:var(--text2)}
  .view-btn.active{background:var(--bg2);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.2)}
  .view-btn svg{width:14px;height:14px}

  /* Canvas area */
  .viewer-canvas-wrap{
    flex:1;overflow:auto;padding:20px 24px 40px;
    position:relative;
  }
  .viewer-canvas{position:relative;min-height:300px}

  /* Footer */
  .viewer-cta{text-align:center;padding:24px 0 8px}
  .viewer-cta a{
    display:inline-flex;align-items:center;gap:8px;
    padding:10px 20px;border-radius:var(--r-md);
    font-size:13px;font-weight:500;color:var(--text);
    background:var(--accent);transition:opacity .15s;text-decoration:none;
  }
  .viewer-cta a:hover{opacity:.85}
  .viewer-footer{text-align:center;padding:12px 0 20px;font-size:12px;color:var(--text3)}
  .viewer-footer a{color:var(--text3);text-decoration:none}
  .viewer-footer a:hover{color:var(--text2)}

  .viewer-loading{text-align:center;padding:80px 0;color:var(--text3);font-size:14px}
  .viewer-error{text-align:center;padding:80px 0;color:var(--red);font-size:14px}

  @media(max-width:768px){
    .viewer-header{padding:16px}
    .viewer-title{font-size:18px}
    .viewer-info{gap:10px}
    .viewer-canvas-wrap{padding:12px}
    .view-switcher{margin-left:0;margin-top:8px}
    .viewer-actions{flex-wrap:wrap}
  }
</style>
</head>
<body>
  <div class="viewer-wrap">
    <!-- Top bar -->
    <div class="viewer-topbar">
      <a href="/" class="viewer-brand">
        <svg width="24" height="24" viewBox="0 0 48 48" fill="none">
          <circle cx="24" cy="24" r="20" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
          <circle cx="24" cy="24" r="10" stroke="#6e7bf2" stroke-width="1.5"/>
          <circle cx="24" cy="24" r="3" fill="#6e7bf2"/>
        </svg>
        <span class="viewer-brand-name">ChronoWeave</span>
      </a>
      <div class="viewer-topbar-right">
        <a href="/discover" class="viewer-topbar-link">Discover</a>
        <a href="/" class="viewer-topbar-link">Create your own</a>
      </div>
    </div>

    <!-- Header -->
    <div class="viewer-header">
      <h1 class="viewer-title" id="viewerTitle">Loading...</h1>
      <div class="viewer-info">
        <div class="viewer-author" id="viewerAuthor"></div>
        <div class="viewer-stats" id="viewerStats"></div>
      </div>
      <div class="viewer-actions" id="viewerActions">
        <button class="like-btn" id="likeBtn" style="display:none">
          <i data-lucide="heart" style="width:14px;height:14px"></i>
          <span id="likeCount">0</span>
        </button>
        <div class="view-switcher" id="viewSwitcher" style="display:none">
          <button class="view-btn active" data-view="vertical">
            <i data-lucide="arrow-down" style="width:14px;height:14px"></i> Vertical
          </button>
          <button class="view-btn" data-view="horizontal">
            <i data-lucide="arrow-right" style="width:14px;height:14px"></i> Horizontal
          </button>
          <button class="view-btn" data-view="list">
            <i data-lucide="list" style="width:14px;height:14px"></i> List
          </button>
        </div>
      </div>
    </div>

    <!-- Canvas for timeline views -->
    <div class="viewer-canvas-wrap" id="canvasWrap">
      <div class="viewer-canvas" id="viewerCanvas">
        <div class="viewer-loading">Loading timeline...</div>
      </div>
    </div>

    <div class="viewer-cta">
      <a href="/">Create your own timeline with ChronoWeave</a>
    </div>
    <div class="viewer-footer">
      <a href="https://www.perplexity.ai/computer" target="_blank" rel="noopener noreferrer">Built with Perplexity Computer</a>
    </div>
  </div>

  <!-- Event detail modal (matches structure expected by modal.js) -->
  <div class="modal-bg hidden" id="modalBg">
    <div class="modal" role="dialog">
      <div class="modal-head"><h3 id="mTitle"></h3><button class="icon-btn" id="mClose" aria-label="Close"><i data-lucide="x" style="width:16px;height:16px"></i></button></div>
      <div class="modal-body">
        <div class="m-dates" id="mDates"></div>
        <div class="m-desc" id="mDesc"></div>
        <div class="m-imp-bar" id="mImpBar"><span class="m-imp-label">Importance</span><span class="m-imp-pips" id="mImpPips"></span></div>
        <div class="m-sources" id="mSources"></div>
        <div class="m-tags" id="mTags"></div>
      </div>
    </div>
  </div>

  <script type="module">
    // -- Stub modules for the view renderers --
    // The views import from state.js, dom.js, modal.js etc.
    // We provide those via a shim approach: dynamically rewrite imports.
    // Instead, we'll inline the needed functions and call the views directly.

    import { renderLinearView } from '/js/views/vertical.js';
    import { renderHorizontalView } from '/js/views/horizontal.js';
    import { renderListView } from '/js/views/list.js';

    // -- State --
    let pubData = null;
    let allEvents = [];
    let currentView = 'vertical';

    const canvas = document.getElementById('viewerCanvas');
    const canvasWrap = document.getElementById('canvasWrap');
    const modalBg = document.getElementById('modalBg');

    function esc(s) {
      const el = document.createElement('span');
      el.textContent = s || '';
      return el.innerHTML;
    }

    // Render the current view
    function renderView() {
      canvas.innerHTML = '';
      canvas.style.height = '';
      canvas.style.minWidth = '';

      if (!allEvents.length) {
        canvas.innerHTML = '<div class="viewer-loading">No events found</div>';
        return;
      }

      try {
        if (currentView === 'vertical') {
          renderLinearView(allEvents, 0, allEvents, canvas);
        } else if (currentView === 'horizontal') {
          renderHorizontalView(allEvents, 0, allEvents, canvas);
        } else {
          renderListView(allEvents, 0, canvas);
        }
      } catch (err) {
        console.error('View render error:', err);
        canvas.innerHTML = `<div class="viewer-error">Failed to render view: ${esc(err.message)}</div>`;
      }
    }

    // -- View switcher --
    document.querySelectorAll('.view-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentView = btn.dataset.view;
        renderView();
      });
    });

    // -- Modal close --
    function closeModal() { modalBg.classList.add('hidden'); }
    modalBg.addEventListener('click', (e) => {
      if (e.target === modalBg) closeModal();
    });
    const mCloseBtn = document.getElementById('mClose');
    if (mCloseBtn) mCloseBtn.addEventListener('click', closeModal);
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeModal();
    });

    // -- Load data --
    (async function() {
      const slug = window.location.pathname.replace(/^\/p\//, '').replace(/\/$/, '');
      if (!slug) {
        canvas.innerHTML = '<div class="viewer-error">No timeline specified</div>';
        return;
      }

      const token = (() => { try { return localStorage.getItem('cw_token'); } catch { return null; } })();

      try {
        const resp = await fetch(`/api/p/${slug}`);
        if (!resp.ok) throw new Error('Timeline not found');
        pubData = await resp.json();

        document.title = `${pubData.title} — ChronoWeave`;
        document.getElementById('viewerTitle').textContent = pubData.title;

        // Author info
        const authorEl = document.getElementById('viewerAuthor');
        const authorPic = pubData.author_picture
          ? `<img class="viewer-author-pic" src="${esc(pubData.author_picture)}" alt="" onerror="this.style.display='none'">`
          : '';
        authorEl.innerHTML = `${authorPic}<span>${esc(pubData.author_name || 'Anonymous')}</span>`;

        // Stats
        const statsEl = document.getElementById('viewerStats');
        const date = new Date(pubData.created_at).toLocaleDateString('en-US', {
          month: 'short', day: 'numeric', year: 'numeric'
        });
        const totalEvents = pubData.data.reduce((sum, tl) => sum + tl.events.length, 0);
        statsEl.innerHTML = `
          <span class="viewer-stat"><i data-lucide="eye" style="width:14px;height:14px"></i> ${pubData.view_count || 0}</span>
          <span class="viewer-stat"><i data-lucide="layers" style="width:14px;height:14px"></i> ${totalEvents} events</span>
          <span class="viewer-stat">${date}</span>
        `;

        // Like button
        const likeBtn = document.getElementById('likeBtn');
        const countEl = document.getElementById('likeCount');
        countEl.textContent = pubData.like_count || 0;
        likeBtn.style.display = '';

        if (token) {
          try {
            const lr = await fetch(`/api/like/${pubData.id}`, {
              headers: { 'Authorization': `Bearer ${token}` }
            });
            if (lr.ok) {
              const s = await lr.json();
              if (s.liked) likeBtn.classList.add('liked');
            }
          } catch {}
        }

        likeBtn.addEventListener('click', async () => {
          if (!token) { window.location.href = '/?login=1'; return; }
          try {
            const r = await fetch(`/api/like/${pubData.id}`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }
            });
            if (!r.ok) throw new Error('Failed');
            const result = await r.json();
            likeBtn.classList.toggle('liked', result.liked);
            countEl.textContent = result.like_count;
          } catch {}
        });

        // Show view switcher
        document.getElementById('viewSwitcher').style.display = '';

        // Flatten all events from all timelines, preserving source color
        allEvents = pubData.data.flatMap(tl =>
          tl.events.map(e => ({
            ...e,
            tags: JSON.stringify(e.tags || []),
            source_color: e.source_color || tl.color,
            source_timeline_name: e.source_timeline_name || tl.name,
          }))
        );

        // Sort chronologically
        allEvents.sort((a, b) => (a.start_date || '').localeCompare(b.start_date || ''));

        // Render
        renderView();
        lucide.createIcons();
      } catch (err) {
        document.getElementById('viewerTitle').textContent = 'Not Found';
        canvas.innerHTML = `<div class="viewer-error">${esc(err.message)}</div>`;
      }
    })();
  </script>
</body>
</html>
