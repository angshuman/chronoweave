<meta name="generator" content="Perplexity Computer">
<meta name="author" content="Perplexity Computer">
<meta property="og:see_also" content="https://www.perplexity.ai/computer">
<link rel="author" href="https://www.perplexity.ai/computer">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Discover Timelines — ChronoWeave</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.js"></script>
<style>
  .hidden{display:none !important}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',system-ui,sans-serif;background:#0f1017;color:#e8e8ec;min-height:100dvh}
  a{text-decoration:none;color:inherit}
  button{background:none;border:none;cursor:pointer;font:inherit;color:inherit}
</style>
<link rel="stylesheet" href="/css/themes.css">
<link rel="stylesheet" href="/css/base.css">
<link rel="stylesheet" href="/css/discover.css">
</head>
<body>
  <div class="discover-wrap">
    <!-- Header -->
    <header class="discover-header">
      <a href="/" class="discover-brand">
        <svg width="28" height="28" viewBox="0 0 48 48" fill="none">
          <circle cx="24" cy="24" r="20" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
          <circle cx="24" cy="24" r="10" stroke="#6e7bf2" stroke-width="1.5"/>
          <circle cx="24" cy="24" r="3" fill="#6e7bf2"/>
          <line x1="24" y1="4" x2="24" y2="14" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
          <line x1="24" y1="34" x2="24" y2="44" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
          <line x1="4" y1="24" x2="14" y2="24" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
          <line x1="34" y1="24" x2="44" y2="24" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
        </svg>
        <span class="discover-brand-name">ChronoWeave</span>
      </a>
      <nav class="discover-nav">
        <a href="/" class="discover-nav-link">Create</a>
        <a href="/discover" class="discover-nav-link active">Discover</a>
        <a href="/" class="discover-nav-cta">
          <i data-lucide="plus" style="width:14px;height:14px"></i> New Timeline
        </a>
      </nav>
    </header>

    <!-- Hero -->
    <div class="discover-hero">
      <h1>Explore Published Timelines</h1>
      <p>Browse timelines created by the community. Discover historical events, research topics, and curated chronologies.</p>
    </div>

    <!-- Content -->
    <div id="discoverContent">
      <div class="discover-loading">
        <div class="loader-ring" style="width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite"></div>
        <p>Loading timelines...</p>
      </div>
    </div>

    <!-- Footer -->
    <div class="discover-footer">
      <a href="https://www.perplexity.ai/computer" target="_blank" rel="noopener noreferrer">Built with Perplexity Computer</a>
    </div>
  </div>

  <script>
    (async function() {
      const content = document.getElementById('discoverContent');

      try {
        const resp = await fetch('/api/discover');
        if (!resp.ok) throw new Error('Failed to load');
        const { recent, most_liked } = await resp.json();

        let html = '';

        // Most Liked section
        if (most_liked && most_liked.length > 0) {
          html += renderSection('Most Liked', 'heart', most_liked);
        }

        // Recent section
        if (recent && recent.length > 0) {
          html += renderSection('Recently Published', 'clock', recent);
        }

        // Empty state
        if ((!recent || recent.length === 0) && (!most_liked || most_liked.length === 0)) {
          html = `
            <div class="discover-empty">
              <svg width="48" height="48" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="1.5">
                <circle cx="24" cy="24" r="20"/>
                <path d="M16 24h16M24 16v16"/>
              </svg>
              <p>No published timelines yet. Be the first to create one.</p>
              <a href="/">Create a timeline</a>
            </div>
          `;
        }

        content.innerHTML = html;
        lucide.createIcons();
      } catch (err) {
        content.innerHTML = `<div class="discover-empty"><p>Could not load timelines. <a href="/discover">Try again</a></p></div>`;
      }

      function renderSection(title, icon, items) {
        const cards = items.map(item => renderCard(item)).join('');
        return `
          <div class="discover-section">
            <div class="discover-section-header">
              <div class="discover-section-title">
                <i data-lucide="${icon}" style="width:18px;height:18px"></i>
                ${title}
              </div>
              <span class="discover-section-count">${items.length} timeline${items.length !== 1 ? 's' : ''}</span>
            </div>
            <div class="discover-grid">${cards}</div>
          </div>
        `;
      }

      function renderCard(item) {
        const date = new Date(item.created_at).toLocaleDateString('en-US', {
          month: 'short', day: 'numeric', year: 'numeric'
        });
        const authorPic = item.author_picture
          ? `<img class="tc-author-pic" src="${esc(item.author_picture)}" alt="" onerror="this.style.display='none'">`
          : '';
        return `
          <a href="/p/${esc(item.slug)}" class="timeline-card">
            <div class="tc-thumb">
              <img src="/api/preview/${esc(item.slug)}.svg" alt="" loading="lazy" onerror="this.parentElement.style.display='none'">
            </div>
            <div class="tc-body">
              <div class="tc-title">${esc(item.title)}</div>
              <div class="tc-desc">${esc(item.description)}</div>
              <div class="tc-badges">
                <span class="tc-badge">${item.event_count} events</span>
                ${item.timeline_count > 1 ? `<span class="tc-badge">${item.timeline_count} timelines</span>` : ''}
              </div>
              <div class="tc-meta">
                <div class="tc-author">
                  ${authorPic}
                  <span class="tc-author-name">${esc(item.author_name)}</span>
                </div>
                <span class="tc-stat"><i data-lucide="heart" style="width:12px;height:12px"></i> ${item.like_count || 0}</span>
                <span class="tc-stat"><i data-lucide="eye" style="width:12px;height:12px"></i> ${item.view_count || 0}</span>
                <span class="tc-stat">${date}</span>
              </div>
            </div>
          </a>
        `;
      }

      function esc(s) {
        const el = document.createElement('span');
        el.textContent = s || '';
        return el.innerHTML;
      }
    })();
  </script>

  <style>
    @keyframes spin { to { transform: rotate(360deg) } }
  </style>
</body>
</html>
